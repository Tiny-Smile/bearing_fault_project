# =============================================================================
# CWRU 轴承故障诊断 1D-CNN Baseline 配置文件
# =============================================================================

# ===== 项目路径配置 =====
# 项目根目录（自动检测，无需修改）
# PROJECT_ROOT: 自动从脚本位置向上查找

# 数据路径
DATA_RAW_DIR: "p02_data/raw/cwru"           # 原始 CWRU 数据目录
DATA_PREPROCESSED_DIR: "p02_data/preprocessed"  # 预处理后数据目录

# 输出路径
LOG_DIR: "p05_logs"                         # 训练日志目录
MODEL_CKPT_DIR: "p04_models_ckpt"           # 模型权重保存目录
RESULTS_DIR: "p06_results"                   # 实验结果目录
FIGURES_DIR: "p06_results/figures"          # 可视化图片目录

# ===== 数据集配置 =====
# CWRU 数据集参数
SAMPLING_RATE: 12000              # 采样频率 (Hz), 可选: 12000 或 48000
SAMPLE_LENGTH: 1024               # 每个样本的序列长度
STRIDE: 512                       # 滑动窗口步长
NORMALIZE: "minmax"              # 归一化方法: "minmax", "zscore", "none"

# 数据集划分
TRAIN_RATIO: 0.7                 # 训练集比例 (70%)
VAL_RATIO: 0.0                   # 验证集比例 (0% = 使用测试集)
TEST_RATIO: 0.3                  # 测试集比例 (30%)
RANDOM_SEED: 42                  # 随机种子（保证可复现性）

# 类别定义
NUM_CLASSES: 4                   # 分类类别数
CLASS_NAMES:
  - "Normal"                     # 正常
  - "Inner_Race"                 # 内圈故障
  - "Outer_Race"                 # 外圈故障
  - "Ball"                       # 滚动体故障

# ===== 模型配置 =====
MODEL:
  TYPE: "CNN1D"                  # 模型类型
  INPUT_LENGTH: 1024             # 输入序列长度
  INPUT_CHANNELS: 1              # 输入通道数（单通道振动信号）
  KERNEL_SIZE: 16                # 第一层卷积核大小
  FIRST_CONV_CHANNELS: 32        # 第一层卷积输出通道数
  DROPOUT: 0.5                   # Dropout 比例

# ===== 训练配置 =====
TRAIN:
  BATCH_SIZE: 32                 # 批次大小
  EPOCHS: 50                     # 训练轮数
  LEARNING_RATE: 0.001           # 学习率
  WEIGHT_DECAY: 1e-4             # 权重衰减（L2正则化）
  OPTIMIZER: "adam"              # 优化器: "adam", "sgd", "adamw"
  SCHEDULER: "step"              # 学习率调度器: "step", "cosine", "none"
  SCHEDULER_STEP: 20             # 学习率下降间隔（step调度器）
  SCHEDULER_GAMMA: 0.5           # 学习率下降倍数

  # 早停配置
  EARLY_STOPPING:
    ENABLED: true                # 是否启用早停
    PATIENCE: 15                 # 容忍轮数
    MIN_DELTA: 0.001            # 被认为有提升的最小变化量

  # 梯度裁剪
  GRADIENT_CLIP:
    ENABLED: false              # 是否启用梯度裁剪
    MAX_NORM: 1.0               # 梯度裁剪阈值

# ===== 设备配置 =====
DEVICE:
  USE_CUDA: true                # 是否使用 CUDA
  CUDA_DEVICE: 0                # GPU 设备编号
  MULTI_GPU: false              # 是否使用多 GPU
  NUM_WORKERS: 0                # DataLoader 工作线程数
  PIN_MEMORY: true              # 是否固定内存

# ===== 输出配置 =====
OUTPUT:
  SAVE_MODEL: true              # 是否保存最佳模型
  SAVE_RESULTS: true            # 是否保存实验结果
  SAVE_PLOTS: true              # 是否保存可视化图表
  PLOT_TYPES:                   # 要生成的可视化图表
    - "training_curve"          # 训练曲线（损失、准确率）
    - "confusion_matrix"        # 混淆矩阵
    - "classification_report"   # 分类报告
  LOG_INTERVAL: 10              # 日志打印间隔（每多少批次）

# ===== 实验配置 =====
EXPERIMENT:
  NAME: "CWRU_1DCNN_Baseline"   # 实验名称
  DESCRIPTION: "CWRU轴承故障诊断 1D-CNN Baseline 模型"  # 实验描述
  TAGS:                            # 实验标签
    - "baseline"
    - "1D-CNN"
    - "CWRU"
    - "fault_diagnosis"

# ===== 打印配置 =====
PRINT:
  VERBOSE: true                  # 详细输出
  SHOW_MODEL_SUMMARY: true       # 显示模型结构摘要
  SHOW_DATASET_INFO: true        # 显示数据集信息
